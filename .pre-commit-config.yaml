default_language_version:
    python: python3.10

default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-format
        types_or: [ python, pyi ]

      - id: ruff-check
        args: [--fix]

  - repo: local
    hooks:
      - id: pytest-cov
        name: pytest coverage check (>=80%)
        entry: uv run pytest promo_service/ --cov=promo_service --cov-fail-under=80 -q
        language: system
        pass_filenames: false
        always_run: true
